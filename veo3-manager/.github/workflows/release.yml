name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows
        run: wails build -clean -trimpath -ldflags "-s -w" -nsis

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: Veo3Manager-windows-amd64
          path: build/bin/Veo3Manager.exe

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Veo3Manager-windows-installer
          path: build/bin/*installer.exe

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        platform: [darwin/amd64, darwin/arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS
        run: wails build -clean -trimpath -ldflags "-s -w" -platform ${{ matrix.platform }}

      - name: Get arch name
        id: arch
        run: echo "name=$(echo '${{ matrix.platform }}' | cut -d/ -f2)" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Veo3 Manager" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Veo3Manager.app" 150 200 \
            --app-drop-link 450 200 \
            "build/bin/Veo3Manager-${{ steps.arch.outputs.name }}.dmg" \
            "build/bin/Veo3Manager.app"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Veo3Manager-macos-${{ steps.arch.outputs.name }}
          path: build/bin/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux
        run: wails build -clean -trimpath -ldflags "-s -w" -platform linux/amd64

      - name: Package tar.gz
        run: |
          cd build/bin
          tar -czvf Veo3Manager-linux-amd64.tar.gz Veo3Manager

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: Veo3Manager-linux-amd64
          path: build/bin/Veo3Manager-linux-amd64.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
